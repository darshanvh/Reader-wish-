<!--
To use the global AJAX loader in any page:

1. Add this to the <head> section:
   <script src="/static/ajax-loader.js"></script>

2. Use these functions in your JavaScript:
   - showAjaxLoader()           // Show with default "Loading..." message
   - showAjaxLoader('message')  // Show with custom message
   - hideAjaxLoader()           // Hide the loader
   
3. Wrap all AJAX calls:
-->
