<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Book Management | Admin Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
<style>
/* --- Color Palette --- */
:root {
    --bg-main: #0F172A;      
    --bg-surface: #1E293B;   
    --text-primary: #F8FAFC; 
    --text-secondary: #94A3B8; 
    --accent: #3B82F6;       
    --accent-hover: #2563EB;
    --danger: #EF4444;       
    --border: rgba(255, 255, 255, 0.1); 
    --input-bg: #0B1120;
}

/* --- Base Reset --- */
* { 
    margin: 0; 
    padding: 0; 
    box-sizing: border-box; 
    font-family: 'Inter', sans-serif; 
}

body { 
    background-color: var(--bg-main); 
    color: var(--text-primary); 
    display: flex; 
    height: 100vh; 
    overflow: hidden; 
}

/* --- Sidebar --- */
.sidebar {
    width: 260px;
    background-color: var(--bg-surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    padding: 24px;
}

.sidebar-header { 
    display: flex; 
    align-items: center; 
    gap: 12px; 
    margin-bottom: 40px; 
    font-size: 1.2rem; 
    font-weight: 600; 
}

.sidebar-header .material-symbols-outlined { 
    color: var(--accent); 
    font-size: 28px; 
}

.nav-links { 
    display: flex; 
    flex-direction: column; 
    gap: 8px; 
    flex-grow: 1; 
}

.nav-link { 
    display: flex; 
    align-items: center; 
    gap: 12px; 
    padding: 12px 16px; 
    color: var(--text-secondary); 
    text-decoration: none; 
    border-radius: 8px; 
    transition: all 0.2s ease; 
    font-weight: 500; 
}

.nav-link:hover, .nav-link.active { 
    background-color: rgba(59, 130, 246, 0.1); 
    color: var(--accent); 
}

.logout-btn { 
    display: flex; 
    align-items: center; 
    gap: 12px; 
    padding: 12px 16px; 
    color: var(--danger); 
    text-decoration: none; 
    border-radius: 8px; 
    transition: all 0.2s ease; 
    margin-top: auto; 
    font-weight: 500; 
}

.logout-btn:hover { 
    background-color: rgba(239, 68, 68, 0.1); 
}

/* --- Main Content Area --- */
.main-content {
    flex-grow: 1;
    padding: 40px;
    overflow-y: auto;
    display: flex;
    justify-content: center;
    align-items: flex-start;
}

/* --- Form Container Card --- */
.form-container {
    background-color: var(--bg-surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 40px;
    width: 100%;
    max-width: 800px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

.form-header { 
    text-align: center; 
    margin-bottom: 32px; 
}

.form-header h2 { 
    display: flex; 
    align-items: center; 
    justify-content: center; 
    gap: 8px; 
    font-size: 1.8rem; 
    margin-bottom: 8px; 
    color: var(--text-primary); 
}

.form-header h2 .material-symbols-outlined { 
    color: var(--accent); 
    font-size: 32px; 
}

.form-header p { 
    color: var(--text-secondary); 
    font-size: 0.95rem; 
}

/* --- Form Layout & Inputs --- */
.form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
    margin-bottom: 24px;
}

.input-group { 
    display: flex; 
    flex-direction: column; 
    gap: 8px; 
}

.input-group label { 
    font-size: 0.9rem; 
    font-weight: 500; 
    color: var(--text-secondary); 
}

.form-input {
    width: 100%;
    padding: 12px 16px;
    background-color: var(--input-bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text-primary);
    font-size: 1rem;
    transition: border-color 0.2s ease;
}

.form-input:focus { 
    outline: none; 
    border-color: var(--accent); 
    box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1); 
}

.form-input::placeholder { 
    color: #475569; 
}

/* --- Custom File Upload --- */
.file-upload-wrapper {
    position: relative;
    background-color: var(--input-bg);
    border: 1px dashed var(--text-secondary);
    border-radius: 8px;
    padding: 12px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s ease;
}

.file-upload-wrapper:hover { 
    border-color: var(--accent); 
    background-color: rgba(59, 130, 246, 0.05); 
}

.file-upload-wrapper input[type="file"] { 
    opacity: 0; 
    position: absolute; 
    top: 0; 
    left: 0; 
    width: 100%; 
    height: 100%; 
    cursor: pointer; 
}

.file-upload-text { 
    color: var(--text-secondary); 
    font-size: 0.9rem; 
    pointer-events: none; 
}

/* --- Custom Toggle Switch --- */
.toggle-container { 
    display: flex; 
    align-items: center; 
    gap: 12px; 
    margin-bottom: 32px; 
    cursor: pointer; 
}

.toggle-label { 
    font-size: 0.95rem; 
    font-weight: 500; 
    color: var(--text-primary); 
}

.toggle-switch {
    position: relative;
    width: 48px;
    height: 24px;
    background-color: var(--input-bg);
    border: 1px solid var(--border);
    border-radius: 24px;
    transition: all 0.3s ease;
}

.toggle-switch::after {
    content: '';
    position: absolute;
    top: 2px;
    left: 2px;
    width: 18px;
    height: 18px;
    background-color: var(--text-secondary);
    border-radius: 50%;
    transition: all 0.3s ease;
}

input[type="checkbox"] { 
    display: none; 
}

input[type="checkbox"]:checked + .toggle-switch { 
    background-color: var(--accent); 
    border-color: var(--accent); 
}

input[type="checkbox"]:checked + .toggle-switch::after { 
    transform: translateX(24px); 
    background-color: white; 
}

/* --- Submit Button --- */
.submit-btn {
    width: 100%;
    padding: 14px;
    background-color: var(--accent);
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 1rem;
    font-weight: 600;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    cursor: pointer;
    transition: background-color 0.2s ease;
}

.submit-btn:hover { 
    background-color: var(--accent-hover); 
}

/* --- Back Link --- */
.back-link {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-top: 24px;
    color: var(--text-secondary);
    text-decoration: none;
    font-size: 0.95rem;
    transition: color 0.2s ease;
}

.back-link:hover {
    color: var(--accent);
}

/* --- Responsive --- */
@media (max-width: 768px) {
    body {
        flex-direction: column;
    }
    
    .sidebar {
        width: 100%;
        border-right: none;
        border-bottom: 1px solid var(--border);
        padding: 16px;
    }
    
    .sidebar-header {
        margin-bottom: 20px;
    }
    
    .nav-links {
        flex-direction: row;
        flex-wrap: wrap;
    }
    
    .main-content {
        padding: 20px;
    }
    
    .form-grid { 
        grid-template-columns: 1fr; 
    }
    
    .form-container {
        padding: 24px;
    }
}
</style>
</head>
<body>

<nav class="sidebar">
    <div class="sidebar-header">
        <span class="material-symbols-outlined">shield_person</span>
        Admin Portal
    </div>
    
    <div class="nav-links">
        <a href="/admin/dashboard" class="nav-link">
            <span class="material-symbols-outlined">dashboard</span> Dashboard
        </a>
        <a href="/admin/books" class="nav-link active">
            <span class="material-symbols-outlined">library_books</span> Books
        </a>
        <a href="/admin/orders" class="nav-link">
            <span class="material-symbols-outlined">shopping_cart</span> Orders
        </a>
        <a href="/admin/users" class="nav-link">
            <span class="material-symbols-outlined">group</span> Users
        </a>
    </div>
    
    <a href="/logout" class="logout-btn">
        <span class="material-symbols-outlined">logout</span> Logout
    </a>
</nav>

<main class="main-content">
    <div class="form-container">
        <div class="form-header">
            <h2>
                <span class="material-symbols-outlined">add_circle</span> 
                Add New Book
            </h2>
            <p>Register a new book into your store inventory</p>
        </div>
        
        <form action="/admin/books/add" method="POST" enctype="multipart/form-data">
            <div class="form-grid">
                <div class="input-group">
                    <label for="book_name">Book Name</label>
                    <input type="text" id="book_name" name="book_name" class="form-input" placeholder="e.g. The Corporate Startup" required>
                </div>
                
                <div class="input-group">
                    <label for="author">Author</label>
                    <input type="text" id="author" name="author" class="form-input" placeholder="e.g. Tendayi Viki" required>
                </div>
                
                <div class="input-group">
                    <label for="genre">Genre</label>
                    <input type="text" id="genre" name="genre" class="form-input" placeholder="e.g. Business & Management" required>
                </div>
                
                <div class="input-group">
                    <label for="price">Price (₹)</label>
                    <input type="number" id="price" name="price" step="0.01" class="form-input" placeholder="0.00" required>
                </div>
                
                <div class="input-group">
                    <label for="stock">Stock Quantity</label>
                    <input type="number" id="stock" name="stock" class="form-input" placeholder="0" required>
                </div>
                
                <div class="input-group">
                    <label>Book Cover Image</label>
                    <div class="file-upload-wrapper">
                        <input type="file" id="image" name="image" accept="image/*" required>
                        <span class="file-upload-text">Click to upload cover image</span>
                    </div>
                </div>
            </div>
            
            <label class="toggle-container" for="availability">
                <input type="checkbox" id="availability" name="availability" checked>
                <div class="toggle-switch"></div>
                <span class="toggle-label">Currently Available for Purchase</span>
            </label>
            
            <button type="submit" class="submit-btn">
                <span class="material-symbols-outlined">library_add</span> 
                Add Book to Inventory
            </button>
        </form>
        
        <a href="/admin/dashboard" class="back-link">
            <span class="material-symbols-outlined">arrow_back</span>
            Back to Dashboard
        </a>
    </div>
</main>

<script>
// Update file upload text when file is selected
document.getElementById('image').addEventListener('change', function(e) {
    const fileName = e.target.files[0]?.name;
    const textElement = this.parentElement.querySelector('.file-upload-text');
    if (fileName) {
        textElement.textContent = fileName;
        textElement.style.color = 'var(--accent)';
    }
});
</script>

</body>
</html>
