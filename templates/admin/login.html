<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Login</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    color: #111;
    text-align: center;
    padding-bottom: 60px;

    background-image: url("https://images.unsplash.com/photo-1512820790803-83ca734da794?auto=format&fit=crop&w=1920&q=80");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    background-attachment: fixed;
    position: relative;
}

body::before {
    content: "";
    position: fixed;
    inset: 0;
    background: rgba(255,255,255,0.75);
    z-index: -1;
}

.container {
    margin: 80px auto;
    padding: 30px;
    width: 400px;
    background: rgba(255,255,255,0.88);
    border-radius: 18px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.2),
                inset 0 0 20px rgba(255,255,255,0.4);
    animation: pop 0.6s ease;
}

@keyframes pop {
    0% { transform: scale(0.9); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
}

h2 {
    color: #2e7d32;
    margin-bottom: 20px;
}

input {
    width: 90%;
    padding: 10px;
    margin: 10px 0;
    border-radius: 8px;
    border: 1px solid #ccc;
    font-size: 15px;
}

button {
    width: 95%;
    padding: 12px;
    margin-top: 15px;
    background: #ff7a00;
    border: none;
    color: black;
    font-weight: bold;
    border-radius: 25px;
    cursor: pointer;
    font-size: 16px;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
}

button:hover {
    transform: scale(1.05);
    box-shadow: 0 6px 15px rgba(0,0,0,0.3);
}

@media (max-width: 480px) {
    .container {
        width: 90%;
        padding: 25px;
    }
    input, button {
        width: 90%;
    }
}
</style>
</head>

<body>

<h2>Admin Login</h2>

<div class="container">
    <form method="POST">
        <input type="text" name="username" placeholder="Admin Username" required><br><br>
        <input type="password" name="password" placeholder="Admin Password" required><br><br>
        <button type="submit">Login</button>
    </form>
</div>

</body>
</html>
