<script>
// General Feedback Form Submission
document.getElementById('generalFeedbackForm').addEventListener('submit', function(e) {
  e.preventDefault();
  
  const name = this.querySelector('.feedback-name-input').value;
  const email = this.querySelector('.feedback-email-input').value;
  const message = this.querySelector('.feedback-message-input').value;
  
  const formData = new FormData();
  formData.append('name', name);
  formData.append('email', email);
  formData.append('message', message);
  
  fetch('/submit-general-feedback', {
    method: 'POST',
    body: formData
  })
  .then(response => response.json())
  .then(data => {
    if (data.success) {
      alert(data.message);
      document.getElementById('generalFeedbackForm').reset();
    } else {
      alert('Error: ' + data.message);
    }
  })
  .catch(error => {
    console.error('Error:', error);
    alert('An error occurred while submitting feedback');
  });
});
</script>
